<style>
.posts-by-year {
    margin-top: 2rem;
}

.year-section {
    margin-bottom: 2rem;
    border: 1px solid #eee;
    border-radius: 8px;
    overflow: hidden;
}

.year-toggle {
    width: 100%;
    background: #f8f9fa;
    border: none;
    padding: 1rem;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: background-color 0.2s;
}

.year-toggle:hover {
    background: #e9ecef;
}

.toggle-icon {
    font-size: 0.8rem;
    transition: transform 0.2s;
    width: 1rem;
}

.toggle-icon.collapsed {
    transform: rotate(-90deg);
}

.year-toggle h2 {
    margin: 0;
    font-size: 1.3rem;
    color: #333;
}

.posts-year-list {
    transition: all 0.3s ease-out;
    overflow: hidden;
}

.posts-year-list.hidden {
    display: none;
}

.post-item {
    border-bottom: 1px solid #f0f0f0;
    padding: 1rem;
    transition: background-color 0.2s;
}

.post-item:last-child {
    border-bottom: none;
}

.post-item:hover {
    background-color: #f8f9fa;
}

.post-link {
    text-decoration: none;
    color: inherit;
    display: block;
}

.post-title {
    margin: 0 0 0.35rem 0;
    font-size: 1.1rem;
    color: #333;
}

.post-date {
    margin: 0;
    color: #999;
    font-size: 0.9rem;
}

.post-link:hover .post-title {
    color: #007bff;
}
</style>

<script>
function toggleYear(year) {
    const postsList = document.getElementById('posts-' + year);
    const icon = document.getElementById('icon-' + year);

    if (postsList.style.display === 'none') {
        postsList.style.display = 'block';
        icon.textContent = '▼';
        icon.classList.remove('collapsed');
    } else {
        postsList.style.display = 'none';
        icon.textContent = '►';
        icon.classList.add('collapsed');
    }
}
</script>
